<!DOCTYPE html>
<html lang="en" data-theme="light" data-layout="desktop">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEARN ENGLISH FOUNDATIONAL SKILLS ONLINE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink: #1c2333;
      --muted: #5a6272;
      --paper: #f4f2ec;
      --cream: #fffcf7;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-soft: #e8effe;
      --accent-border: rgba(37, 99, 235, 0.22);
      --highlight: #0d9488;
      --gold: #b45309;
      --border: rgba(28, 35, 51, 0.1);
      --shadow: 0 20px 50px rgba(28, 35, 51, 0.08);
      --radius: 16px;
      --max: 960px;
      --max-mobile: 480px;
      --toolbar-bg: rgba(255, 252, 247, 0.92);
      --focus: 0 0 0 3px rgba(37, 99, 235, 0.35);
    }

    [data-theme="dark"] {
      --ink: #e8eaf0;
      --muted: #9aa3b2;
      --paper: #0f1218;
      --cream: #171b24;
      --accent: #60a5fa;
      --accent-hover: #93c5fd;
      --accent-soft: rgba(96, 165, 250, 0.12);
      --accent-border: rgba(96, 165, 250, 0.35);
      --highlight: #2dd4bf;
      --gold: #fbbf24;
      --border: rgba(232, 234, 240, 0.12);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      --toolbar-bg: rgba(15, 18, 24, 0.92);
      --focus: 0 0 0 3px rgba(96, 165, 250, 0.45);
    }

    /* --- BASIC STYLES --- */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: "DM Sans", sans-serif; 
      color: var(--ink); 
      background: var(--paper); 
      line-height: 1.6;
    }

    .wrap { max-width: var(--max); margin: 0 auto; padding: 2rem; }
    .card, .panel { background: var(--cream); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }

    /* --- SMART AUDIO LOGIC --- */
    .audio-control-group {
      display: none !important; /* Hidden by default */
      align-items: center;
      gap: 12px;
      margin-bottom: 1rem;
    }

    /* Only show audio when the quiz shell has this class */
    .oral-mode .audio-control-group {
      display: flex !important;
    }

    .btn-audio {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.6rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--accent-border);
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }

    /* --- BUTTONS & INPUTS --- */
    .btn-course, .btn-next {
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
    }

    .choice-btn {
      width: 100%;
      text-align: left;
      padding: 1rem;
      margin-bottom: 0.5rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--cream);
      cursor: pointer;
    }

    /* --- HIDING ELEMENTS --- */
    [hidden] { display: none !important; }
  </style>
</head>
<body>

  <div class="wrap">
    <header>
      <h1>LEARN ENGLISH FOUNDATIONAL SKILLS ONLINE</h1>
      <p>Select a course to begin your assessment.</p>
    </header>

    <section id="course-selection">
      <div class="skills-grid">
        <div class="card">
          <h3>Vocabulary Development</h3>
          <button class="btn-course" onclick="startQuiz('Vocabulary')">Choose this course</button>
        </div>
        <div class="card">
          <h3>Oral Language & Listening</h3>
          <button class="btn-course" onclick="startQuiz('Oral')">Choose this course</button>
        </div>
      </div>
    </section>

    <div id="quiz-shell" hidden>
      <div class="panel">
        <h2 id="question-text">Question loading...</h2>

        <div class="audio-control-group" id="audio-block">
          <button type="button" class="btn-audio" onclick="playQuestionAudio()">
            <span>🔊</span> Play Audio
          </button>
          <span style="font-size: 0.9rem; color: var(--muted);">Listen, then answer.</span>
        </div>

        <div id="choices-container"></div>
      </div>
    </div>
  </div>

  <dialog id="start-modal" class="card" style="margin: auto; width: 400px;">
    <h3 id="modal-title">Ready to start?</h3>
    <p>This assessment helps place you in the right level. (Notice: feedback text removed as requested).</p>
    
    <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px;">
      <input type="text" id="username" placeholder="Enter Name">
      <button class="btn-next" onclick="confirmStart()">Start Assessment</button>
    </div>
  </dialog>

  <script>
    let currentCourse = "";
    const modal = document.getElementById('start-modal');
    const shell = document.getElementById('quiz-shell');
    const audioBlock = document.getElementById('audio-block');

    function startQuiz(courseType) {
      currentCourse = courseType;
      document.getElementById('modal-title').innerText = "Start " + courseType + " Assessment";
      modal.showModal();
    }

    function confirmStart() {
      modal.close();
      document.getElementById('course-selection').hidden = true;
      shell.hidden = false;

      // APPLY SMART AUDIO LOGIC
      if (currentCourse === 'Oral') {
        shell.classList.add('oral-mode');
      } else {
        shell.classList.remove('oral-mode');
      }

      loadQuestion();
    }

    function loadQuestion() {
      const qText = document.getElementById('question-text');
      const container = document.getElementById('choices-container');
      
      if (currentCourse === 'Oral') {
        qText.innerText = "Click the button above to listen to the question.";
      } else {
        qText.innerText = "Which word describes a thick, creamy soup?";
      }

      container.innerHTML = `
        <button class="choice-btn">Broth</button>
        <button class="choice-btn">Chowder</button>
        <button class="choice-btn">Clear</button>
      `;
    }

    function playQuestionAudio() {
      // Simple logic to use Browser Text-to-Speech
      const msg = new SpeechSynthesisUtterance("Which word describes a thick, creamy soup?");
      window.speechSynthesis.speak(msg);
    }
  </script>
</body>
</html>
